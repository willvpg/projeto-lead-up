<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contato - LeadUp Agency</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="container header-container">
      <h1 class="logo"><a href="index.html">LeadUp Agency</a></h1>
      <nav>
        <button id="menu-toggle" class="menu-toggle">&#9776;</button>
        <ul id="nav-menu" class="nav-menu">
          <li><a href="index.html">Início</a></li>
          <li><a href="sobre.html">Sobre</a></li>
          <li><a href="solucao.html">Solução</a></li>
          <li><a href="diferenciais.html">Diferenciais</a></li>
          <li><button id="toggle-theme">🌓</button></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="section fade-in">
    <div class="container">
      <h2>Fale Conosco</h2>
      <form id="form">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" required>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
        <label for="mensagem">Mensagem</label>
        <textarea id="mensagem" name="mensagem" required></textarea>
        <button type="submit">Enviar</button>
        <p id="form-status" class="form-status"></p>
      </form>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2025 LeadUp Agency. Todos os direitos reservados.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
